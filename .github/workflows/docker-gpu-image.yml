name: GPU Image
on:
  workflow_dispatch: null
  schedule:
    - cron: '0 0 * * 0'
  push:
    # Trigger on the files the GPU Dockerfile actually consumes. The previous
    # list referenced spatial-env.yml / jupyter-ai.yml / install.r (which don't
    # exist) and omitted the install-*.sh scripts the Dockerfile now COPYs and
    # runs, so script edits would silently never rebuild the image.
    paths:
      - 'images/Dockerfile.gpu'
      - 'images/install-claude.sh'
      - 'images/install-jupyter-ai.sh'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
    # For biggish images, github actions runs out of disk space.
    # So we cleanup some unwanted things in the disk image, and reclaim that space for our docker use
    # https://github.com/actions/virtual-environments/issues/2606#issuecomment-772683150
    # and https://github.com/easimon/maximize-build-space/blob/b4d02c14493a9653fe7af06cc89ca5298071c66e/action.yml#L104
    # This gives us a total of about 52G of free space, which should be enough for now
      - name: cleanup disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h
      - uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        if: github.repository == 'boettiger-lab/k8s'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build and push
        if: github.repository == 'boettiger-lab/k8s'
        uses: docker/build-push-action@v6
        with:
          context: images/
          file: images/Dockerfile.gpu
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: true
          tags: ghcr.io/boettiger-lab/k8s-gpu:latest
