# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
  namespace: system-upgrade
spec:
  channel: https://update.k3s.io/v1-release/channels/stable
  concurrency: 1
  # cordon must stay false: cirrus is the control-plane AND the data/compute node
  # (MinIO + JupyterHub + Traefik live here). Cordoning it during a k3s upgrade
  # evicts CoreDNS/Traefik onto thelio and has left cirrus stuck SchedulingDisabled,
  # which forces MinIO<->JupyterHub traffic across the 1Gb wire. Never re-enable.
  cordon: false
  nodeSelector:
    matchExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: In
      values:
      - "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade
---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
  namespace: system-upgrade
spec:
  channel: https://update.k3s.io/v1-release/channels/stable
  concurrency: 1
  cordon: false
  nodeSelector:
    matchExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: DoesNotExist
  prepare:
    args:
    - prepare
    - server-plan
    image: rancher/k3s-upgrade
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade


      
