apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-6
  namespace: vllm
  labels:
    k8s-app: vllm-cirrus-qwen3-6
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      k8s-app: vllm-cirrus-qwen3-6
  template:
    metadata:
      labels:
        k8s-app: vllm-cirrus-qwen3-6
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: cirrus
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: vllm-huggingface-token
              key: token
        - name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-api-key
              key: api-key
        - name: OMP_NUM_THREADS
          value: "4"
        args:
        - --model
        - cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
        - --served-model-name
        - qwen3-6
        - --dtype
        - auto
        - --trust-remote-code
        - --tensor-parallel-size
        - "1"
        # cirrus is time-sliced (no VRAM cap); give vLLM essentially the whole 48GB card.
        - --gpu-memory-utilization
        - "0.95"
        - --max-model-len
        - "131072"
        - --limit-mm-per-prompt
        - '{"image": 0, "audio": 0, "video": 0}'
        - --enable-auto-tool-choice
        - --tool-call-parser
        - qwen3_coder
        - --reasoning-parser
        - qwen3
        # The default FlashInfer backend crashes in the prefill kernel for this
        # model's head_dim 256 on this GPU (BatchPrefillWithPagedKVCache: invalid
        # argument), killing EngineCore on every request. FLASH_ATTN needs compute
        # capability >= 8 (this is a Turing RTX 8000, cc 7.5), so Triton is the
        # stable backend here. Set via --attention-backend; the old
        # VLLM_ATTENTION_BACKEND env var was removed in vLLM 0.23.0.
        - --attention-backend
        - TRITON_ATTN
        # --- PERF (2026-07-07): ~8x single-stream decode (17.6 -> ~140 tok/s). ---
        # We used to run --enforce-eager, which disabled CUDA graphs and was the
        # dominant bottleneck (~5x). It was a workaround for two issues now handled
        # directly: (1) the head_dim-256 attention crash above -> TRITON_ATTN; and
        # (2) CUDA graph capture on this hybrid Mamba+attention MoE needs
        # max_num_seqs <= available Mamba cache blocks, else engine init aborts with
        # "max_num_seqs exceeds available Mamba cache blocks". Cap it and CUDA graphs
        # work: 17.6 -> 86.9 tok/s just from re-enabling them.
        - --max-num-seqs
        - "64"
        # MTP speculative decoding: this AWQ checkpoint ships the mtp.* weights, so
        # it works on Turing too (86.9 -> ~140 tok/s). Triton MoE for the draft layers.
        - --speculative-config
        - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
        # Headroom for the extra draft-token slots (silences the max_num_scheduled_tokens warning).
        - --max-num-batched-tokens
        - "8192"
        - --enable-prefix-caching
        # Match vllm/nimbus/deploy-qwen.yaml: force greedy by default (the checkpoint's
        # generation_config defaults to temperature=1.0). Clients may still override.
        - --override-generation-config
        - '{"temperature": 0.0}'
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: hf-cache
          mountPath: /root/.cache/huggingface
        resources:
          requests:
            cpu: 4
            memory: 16Gi
            nvidia.com/gpu: 2
          limits:
            cpu: 4
            memory: 16Gi
            nvidia.com/gpu: 2
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
      - name: hf-cache
        hostPath:
          path: /home/cboettig/.cache/huggingface
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen3-6-service
  namespace: vllm
  labels:
    k8s-app: vllm-cirrus-qwen3-6
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    k8s-app: vllm-cirrus-qwen3-6
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-qwen3-6-ingress
  namespace: vllm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    traefik.ingress.kubernetes.io/service.servertransport: vllm-vllm-long-timeout@kubernetescrd
  labels:
    app: vllm-cirrus-qwen3-6
spec:
  ingressClassName: traefik
  rules:
  - host: qwen3-cirrus.carlboettiger.info
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vllm-qwen3-6-service
            port:
              number: 8000
  tls:
  - hosts:
    - qwen3-cirrus.carlboettiger.info
    secretName: vllm-qwen3-tls
