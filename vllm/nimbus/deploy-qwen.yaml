apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen
  namespace: default
  labels:
    k8s-app: vllm-nimbus-nemotron   # same label so vllm-nimbus-service routes here
spec:
  replicas: 1
  # Recreate: nimbus is one GB10 time-sliced into 8 nvidia.com/gpu replicas
  # (see reference docs). A GPU-requesting pod can't surge-replace; tear down first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      k8s-app: vllm-nimbus-nemotron
  template:
    metadata:
      labels:
        k8s-app: vllm-nimbus-nemotron
    spec:
      runtimeClassName: nvidia
      imagePullSecrets:
      - name: ngc-pull
      containers:
      - name: vllm
        # Official NVIDIA NGC vLLM. NOT vllm/vllm-openai:nightly — that image is the
        # one that HANGS on Spark right after attention-backend selection (FlashInfer
        # had no precompiled SM12.1 cubins -> JIT deadlock). NGC 26.05.post1 ships the
        # SM12.1 cubins and is reported working for this exact NVFP4 checkpoint on sm121.
        image: nvcr.io/nvidia/vllm:26.05.post1-py3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-token
              key: token
              optional: true
        - name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-api-key
              key: api-key
        - name: OMP_NUM_THREADS
          value: "4"
        # Belt-and-suspenders with --moe-backend marlin: the FlashInfer FP4 MoE path
        # crashes NVFP4 MoE on GB10/SM121 (FlashInfer #2776, cudaErrorIllegalAddress).
        # This checkpoint's mlp.experts are W4A16_NVFP4, so that path MUST be avoided.
        - name: VLLM_USE_FLASHINFER_MOE_FP4
          value: "0"
        # NVIDIA DGX Spark recipe, verbatim from the model card README, adapted to k8s.
        args:
        - vllm
        - serve
        - nvidia/Qwen3.6-35B-A3B-NVFP4
        - --served-model-name
        - qwen
        - --host
        - 0.0.0.0
        - --port
        - "8000"
        - --tensor-parallel-size
        - "1"
        - --trust-remote-code
        - --kv-cache-dtype
        - fp8
        - --attention-backend
        - flashinfer
        - --moe-backend
        - marlin
        - --gpu-memory-utilization
        - "0.4"
        - --max-model-len
        - "262144"
        - --max-num-seqs
        - "4"
        - --max-num-batched-tokens
        - "8192"
        - --enable-chunked-prefill
        - --async-scheduling
        - --enable-prefix-caching
        - --load-format
        - fastsafetensors
        - --speculative-config
        - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
        - --reasoning-parser
        - qwen3
        - --tool-call-parser
        - qwen3_xml
        - --enable-auto-tool-choice
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: hf-cache
          mountPath: /root/.cache/huggingface
        # Readiness only (no liveness): if it hangs at backend selection (the known
        # Spark bug) the pod stays NotReady for debugging instead of crash-looping.
        # Generous window: weights are local but MTP + graph capture take minutes.
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 15
          failureThreshold: 60
        resources:
          requests:
            cpu: 4
            memory: 64Gi
            nvidia.com/gpu: 6
          limits:
            cpu: 4
            memory: 64Gi
            nvidia.com/gpu: 6
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
      - name: hf-cache
        hostPath:
          path: /home/cboettig/.cache/huggingface
          type: Directory
