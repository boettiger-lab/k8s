apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemotron
  namespace: default
  labels:
    k8s-app: vllm-nimbus-nemotron
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: vllm-nimbus-nemotron
  template:
    metadata:
      labels:
        k8s-app: vllm-nimbus-nemotron
    spec:
      runtimeClassName: nvidia
      imagePullSecrets:
      - name: ghcr-pull
      containers:
      - name: vllm
        image: ghcr.io/boettiger-lab/vllm-dgx-spark:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-token
              key: token
              optional: true
        - name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-api-key
              key: api-key
        - name: OMP_NUM_THREADS
          value: "4"
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: "1"
        # Required for NVFP4 on Blackwell (Marlin kernels)
        - name: VLLM_NVFP4_GEMM_BACKEND
          value: "marlin"
        - name: VLLM_TEST_FORCE_FP8_MARLIN
          value: "1"
        - name: VLLM_MARLIN_USE_ATOMIC_ADD
          value: "1"
        args:
        - vllm
        - serve
        - nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
        - --served-model-name
        - nemotron
        - --dtype
        - auto
        - --trust-remote-code
        - --enable-auto-tool-choice
        - --tool-call-parser
        - qwen3_coder
        - --reasoning-parser-plugin
        - /reasoning-parser/super_v3_reasoning_parser.py
        - --reasoning-parser
        - super_v3
        - --tensor-parallel-size
        - "1"
        - --max-model-len
        - "262144"
        - --gpu-memory-utilization
        - "0.7"
        - --kv-cache-dtype
        - fp8
        - --load-format
        - fastsafetensors
        - --attention-backend
        - TRITON_ATTN
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --max-num-seqs
        - "10"
        volumeMounts:
        - name: reasoning-parser
          mountPath: /reasoning-parser
          readOnly: true
        - name: dshm
          mountPath: /dev/shm
        - name: hf-cache
          mountPath: /root/.cache/huggingface
        resources:
          requests:
            cpu: 4
            memory: 85Gi
            nvidia.com/gpu: 6
          limits:
            cpu: 4
            memory: 85Gi
            nvidia.com/gpu: 6
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
      volumes:
      - name: reasoning-parser
        hostPath:
          path: /home/cboettig/Documents/github/boettiger-lab/k8s/vllm/nimbus
          type: Directory
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
      - name: hf-cache
        hostPath:
          path: /home/cboettig/.cache/huggingface
          type: Directory
