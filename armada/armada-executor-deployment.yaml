# Manually created to work around armada-operator v0.7.0 bug where
# ports[2].containerPort is left empty for the executor Deployment.
# Owner reference set so the operator can manage lifecycle.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: armada-executor
  namespace: armada
  labels:
    app: armada-executor
  ownerReferences:
    - apiVersion: install.armadaproject.io/v1alpha1
      kind: Executor
      name: armada-executor
      uid: c05f7b37-bbc8-457e-9a89-621c3a45b7f3
      controller: true
      blockOwnerDeletion: true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: armada-executor
  template:
    metadata:
      labels:
        app: armada-executor
    spec:
      serviceAccountName: armada-executor
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
      containers:
        - name: armada-executor
          image: gresearch/armada-executor:latest
          args:
            - --config
            - /config/armada-executor-config.yaml
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: profiling
              containerPort: 1337
              protocol: TCP
          volumeMounts:
            - name: user-config
              mountPath: /config
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 2000
          resources:
            limits:
              cpu: 300m
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 512Mi
      volumes:
        - name: user-config
          secret:
            secretName: armada-executor
