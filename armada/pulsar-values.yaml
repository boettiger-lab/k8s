# Minimal single-node Pulsar for development/small clusters.
# For production, increase replication factors and replica counts.
# Uses the official Apache Pulsar chart (https://pulsar.apache.org/charts)

components:
  functions: false
  proxy: false
  toolset: false
  pulsar_manager: false

monitoring:
  prometheus: false
  grafana: false
  node_exporter: false
  alert_manager: false

autoRecovery:
  enabled: false

zookeeper:
  replicaCount: 1
  podMonitor:
    enabled: false
  volumes:
    data:
      storageClassName: local-path
      size: 5Gi

bookkeeper:
  replicaCount: 1
  podMonitor:
    enabled: false
  volumes:
    journal:
      storageClassName: local-path
      size: 5Gi
    ledgers:
      storageClassName: local-path
      size: 10Gi

broker:
  replicaCount: 1
  podMonitor:
    enabled: false
  configData:
    # Single-replica ledger settings — required when bookkeeper replicaCount=1
    managedLedgerDefaultEnsembleSize: "1"
    managedLedgerDefaultWriteQuorum: "1"
    managedLedgerDefaultAckQuorum: "1"
