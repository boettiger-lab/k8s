architecture: standalone

auth:
  enabled: false

master:
  persistence:
    storageClass: local-path
    size: 5Gi
  # Default bitnami "nano" preset (192Mi limit) OOM-killed redis in a tight loop
  # (8,547 restarts). Redis holds Armada job events — give it real headroom.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
