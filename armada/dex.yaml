---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: armada
data:
  config.yaml: |
    issuer: https://dex.carlboettiger.info

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: Ov23liOV5rxCR1fEEInJ
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: https://dex.carlboettiger.info/callback
        orgs:
        - name: boettiger-lab
        teamNameField: slug
        loadAllGroups: false

    oauth2:
      skipApprovalScreen: true

    staticClients:
    - id: armadactl
      name: armadactl
      public: true
      redirectURIs:
      - http://localhost:26512/callback
      - /device/callback

    enablePasswordDB: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: armada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      containers:
      - name: dex
        image: ghcr.io/dexidp/dex:v2.41.1
        command: ["/usr/local/bin/dex", "serve", "/etc/dex/config.yaml"]
        ports:
        - containerPort: 5556
        env:
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dex-github-secret
              key: clientSecret
        volumeMounts:
        - name: config
          mountPath: /etc/dex
          readOnly: true
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5556
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: dex-config
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: armada
spec:
  selector:
    app: dex
  ports:
  - port: 5556
    targetPort: 5556
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dex
  namespace: armada
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: traefik
  rules:
  - host: dex.carlboettiger.info
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dex
            port:
              number: 5556
  tls:
  - hosts:
    - dex.carlboettiger.info
    secretName: dex-tls
