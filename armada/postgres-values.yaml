auth:
  database: armada
  username: armada
  # Password set via secret: armada-postgres-secret
  existingSecret: armada-postgres-secret
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password

primary:
  persistence:
    storageClass: local-path
    size: 10Gi
  # Default bitnami "nano" preset (192Mi limit) OOM-killed postgres (16 restarts).
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
