# Prometheus metrics store for dcgm-exporter, vLLM /metrics, and smartctl-exporter.
# Alertmanager, kube-state-metrics, Pushgateway stay off — not needed yet.
alertmanager:
  enabled: false
kube-state-metrics:
  enabled: false
# node-exporter: ON, but on :9101 (not the default :9100). The existing
# armada-pulsar-prometheus-node-exporter runs hostNetwork:true and owns host
# :9100 on cirrus + thelio; a second exporter on 9100 goes Pending and fails
# `helm --wait` ("client rate limiter ... context deadline exceeded"). 9101
# sidesteps the collision. Tradeoff: two node-exporters per host until armada's
# broken monitoring bundle is retired, at which point ours can move back to 9100.
prometheus-node-exporter:
  enabled: true
  service:
    port: 9101
    targetPort: 9101
prometheus-pushgateway:
  enabled: false

server:
  retention: "15d"
  persistentVolume:
    storageClass: openebs-zfs
    size: 5Gi
