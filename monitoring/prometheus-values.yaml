# Prometheus metrics store for dcgm-exporter, vLLM /metrics, and smartctl-exporter.
# Alertmanager, kube-state-metrics, Pushgateway stay off — not needed yet.
alertmanager:
  enabled: false
kube-state-metrics:
  enabled: false
# node-exporter: ON, on the standard :9100. (Was briefly on :9101 to avoid the
# armada-pulsar node-exporter that owned :9100; armada was torn down 2026-07-11,
# so :9100 is free again and ours uses the default.)
prometheus-node-exporter:
  enabled: true
prometheus-pushgateway:
  enabled: false

server:
  retention: "15d"
  persistentVolume:
    storageClass: openebs-zfs
    size: 5Gi
